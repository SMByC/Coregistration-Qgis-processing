name: Build extlibs ZIPs

# Manually triggered: dispatch from the Actions tab whenever a new extlibs
# build is needed (e.g. after bumping plugin/arosics versions). The job
# produces one ZIP per OS x Python version, named to match the URL pattern
# expected by Coregistration/utils/extralibs.py.
on:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
  group: extlibs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: extlibs (${{ matrix.archive_os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            archive_os: linux
          - os: macos-latest
            archive_os: macos
          - os: windows-latest
            archive_os: windows

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniforge (with mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict
          activate-environment: build
          auto-activate-base: false

      - name: Install runtime libraries
        run: |
          set -euo pipefail
          mamba install --name build --file requirements.txt -y
          SITE=$(conda run -n build python -c \
            "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          echo "Installed package dirs in $SITE:"
          ls "$SITE" | head -30

      - name: Locate site-packages and stage as ./extlibs
        run: |
          set -euo pipefail
          PURELIB=$(conda run -n build python -c \
            "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          PLATLIB=$(conda run -n build python -c \
            "import sysconfig; print(sysconfig.get_paths()['platlib'])")
          echo "purelib : $PURELIB"
          echo "platlib : $PLATLIB"
          du -sh "$PURELIB" || true

          mkdir -p ./extlibs
          cp -a "$PURELIB/." ./extlibs/

          if [ "$PLATLIB" != "$PURELIB" ]; then
            echo "platlib differs from purelib — merging $PLATLIB"
            cp -a "$PLATLIB/." ./extlibs/
          fi

          echo "--- extlibs contents after staging ---"
          ls ./extlibs | head -30
          echo "Total size:"
          du -sh ./extlibs

      - name: Trim extlibs to reduce ZIP size
        run: |
          set -euxo pipefail
          cd extlibs

          # --- 1. Packages already shipped by QGIS itself ----------------
          rm -rf \
            numpy numpy-* numpy.libs \
            osgeo* gdal* GDAL* \
            pyproj pyproj-* \
            shapely shapely-* Shapely-* \
            fiona fiona-* Fiona-*

          # --- 2. Packaging tooling never used at runtime ----------------
          rm -rf \
            pip pip-* \
            setuptools setuptools-* \
            wheel wheel-* \
            pkg_resources \
            distutils-precedence.pth

          # --- 3. Heavy plotting / interactive stacks pulled in transit --
          rm -rf \
            plotly plotly-* \
            panel panel-* \
            bokeh bokeh-* \
            holoviews holoviews-* \
            dash dash-* \
            jupyterlab* jupyter* notebook* \
            ipython* ipykernel* \
            babel babel-* rtree rtree-*

          # --- 4. Strip per-package dev junk -----------------------------
          find . -type d \( \
            -name "tests" -o -name "test" \
            -o -name "examples" -o -name "example" \
            -o -name "__pycache__" \
            -o -name ".pytest_cache" -o -name ".mypy_cache" \
          \) -prune -exec rm -rf {} +

          # --- 5. Per-package documentation files ------------------------
          find . -type f \( \
            -iname "*.md" \
            -o -iname "README*" \
            -o -iname "CHANGELOG*" \
            -o -iname "HISTORY*" \
            -o -iname "AUTHORS*" \
            -o -iname "CONTRIBUTING*" \
            -o -iname "*.rst" \
          \) -delete

          # --- 6. Bytecode caches ----------------------------------------
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

          # --- 7. Slim down .dist-info/ metadata folders -----------------
          find . -type d -name "*.dist-info" -print0 | while IFS= read -r -d '' d; do
            rm -f \
              "$d/RECORD" \
              "$d/INSTALLER" \
              "$d/REQUESTED" \
              "$d/WHEEL" \
              "$d/AUTHORS" \
              "$d/LICENSE"* \
              "$d/NOTICE"*
          done

          echo "--- trimmed extlibs size ---"
          du -sh .
          du -sh */ 2>/dev/null | sort -h | tail -n 20 || true

      - name: Strip debug symbols from native modules (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -eu
          cd extlibs
          if [ "${{ runner.os }}" = "macOS" ]; then
            find . -type f \( -name "*.so" -o -name "*.dylib" \) -print0 \
              | xargs -0 -r -n 50 strip -x 2>/dev/null || true
          else
            find . -type f -name "*.so*" -print0 \
              | xargs -0 -r -n 50 strip --strip-unneeded 2>/dev/null || true
          fi
          echo "--- stripped extlibs size ---"
          du -sh .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extlibs_${{ matrix.archive_os }}_py${{ matrix.python-version }}
          path: extlibs
          compression-level: 9
          retention-days: 30
          if-no-files-found: error
