name: Build extlibs ZIPs

# Manually triggered: dispatch from the Actions tab whenever a new extlibs
# build is needed (e.g. after bumping plugin/arosics versions). The job
# produces one ZIP per OS x Python version, named to match the URL pattern
# expected by Coregistration/utils/extralibs.py.
on:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
  group: extlibs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: extlibs (${{ matrix.archive_os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          - os: ubuntu-latest
            archive_os: linux
          - os: macos-latest
            archive_os: macos
          - os: windows-latest
            archive_os: windows

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniforge (with mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          # Do NOT ask the action to create/activate a named "build" env.
          # On Windows the action invokes `mamba.bat create --name build ...`
          # which fails to register the env with recent mamba (the post-step
          # `conda activate build` errors with EnvironmentNameNotFound).
          # The action only warns, the job continues, and packages end up
          # installed into base instead of `build` — producing a broken ZIP
          # with only the base packaging libs. We create the env ourselves
          # below with an explicit --prefix, which avoids the named-env path.
          activate-environment: base
          auto-activate-base: true

      - name: Create build env and resolve prefix
        # Create the env explicitly with --prefix so the location is known
        # and identical across OSes, sidestepping the named-env registration
        # bug on Windows.
        run: |
          set -euo pipefail
          PREFIX="${RUNNER_TEMP}/build_env"
          mamba create --yes --prefix "$PREFIX" "python=${{ matrix.python-version }}"
          echo "CONDA_BUILD_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          echo "Build env prefix: $PREFIX"

      - name: Install runtime libraries
        run: |
          set -euo pipefail
          mamba install --prefix "$CONDA_BUILD_PREFIX" --file requirements.txt -y

      - name: Restore scikit-image .pyi stubs via pip wheel
        # conda-forge's scikit-image package omits the *.pyi stub files that
        # lazy_loader.attach_stub() reads at *runtime* (not just for type
        # checking). Reinstall scikit-image from the PyPI wheel with --no-deps
        # so we get the stubs without altering any other dependency versions.
        run: |
          set -euo pipefail
          SKIMAGE_VER=$(conda run --prefix "$CONDA_BUILD_PREFIX" python -c \
            "import importlib.metadata; print(importlib.metadata.version('scikit-image'))")
          conda run --prefix "$CONDA_BUILD_PREFIX" pip install \
            --no-deps --force-reinstall "scikit-image==${SKIMAGE_VER}"
          # Verify the stub landed
          conda run --prefix "$CONDA_BUILD_PREFIX" python -c \
            "import skimage; print('skimage OK, version', skimage.__version__)"

      - name: Stage site-packages as ./extlibs
        # construct the site-packages path directly from
        # CONDA_BUILD_PREFIX using the OS-specific conda layout:
        #   Linux/macOS : <PREFIX>/lib/pythonX.Y/site-packages
        #   Windows     : <PREFIX>/Lib/site-packages  (no version component)
        run: |
          set -euo pipefail

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            SITE="$CONDA_BUILD_PREFIX/Lib/site-packages"
          else
            PYVER=$(conda run --prefix "$CONDA_BUILD_PREFIX" python -c \
              "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            SITE="$CONDA_BUILD_PREFIX/lib/python${PYVER}/site-packages"
            # Some Linux distros also install native extensions under lib64/
            SITE64="$CONDA_BUILD_PREFIX/lib64/python${PYVER}/site-packages"
          fi

          echo "site-packages : $SITE"
          du -sh "$SITE" || true

          mkdir -p ./extlibs
          cp -a "$SITE/." ./extlibs/

          # Merge lib64 if it exists and differs (Linux only)
          if [[ "${{ runner.os }}" != "Windows" ]] && \
             [ -d "${SITE64:-}" ] && [ "$SITE64" != "$SITE" ]; then
            echo "Merging lib64 site-packages: $SITE64"
            cp -a "$SITE64/." ./extlibs/
          fi

          echo "--- extlibs contents after staging ---"
          ls ./extlibs | head -40
          echo "--- Total size ---"
          du -sh ./extlibs

      - name: Trim extlibs to reduce ZIP size
        run: |
          set -euxo pipefail
          cd extlibs

          # --- 1. Packages already shipped by QGIS itself ----------------
          rm -rf \
            numpy numpy-* numpy.libs \
            osgeo* gdal* GDAL* \
            pyproj pyproj-* \
            shapely shapely-* Shapely-* \
            fiona fiona-* Fiona-*

          # --- 2. Packaging tooling never used at runtime ----------------
          rm -rf \
            pip pip-* \
            setuptools setuptools-* \
            wheel wheel-* \
            pkg_resources \
            distutils-precedence.pth

          # --- 3. Heavy plotting / interactive stacks pulled in transit --
          # (arosics imports them only for optional plotting features)
          rm -rf \
            plotly plotly-* \
            panel panel-* \
            bokeh bokeh-* \
            holoviews holoviews-* \
            dash dash-* \
            jupyterlab* jupyter* notebook* \
            ipython* ipykernel* \
            babel babel-* rtree rtree-*

          # --- 4. Strip per-package dev junk -----------------------------
          find . -type d \( \
            -name "tests" -o -name "test" \
            -o -name "examples" -o -name "example" \
            -o -name "__pycache__" \
            -o -name ".pytest_cache" -o -name ".mypy_cache" \
          \) -prune -exec rm -rf {} +

          # --- 5. Per-package documentation files ------------------------
          find . -type f \( \
            -iname "*.md" \
            -o -iname "README*" \
            -o -iname "CHANGELOG*" \
            -o -iname "HISTORY*" \
            -o -iname "AUTHORS*" \
            -o -iname "CONTRIBUTING*" \
            -o -iname "*.rst" \
          \) -delete

          # --- 6. Bytecode caches (Python will regenerate at first use) --
          find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete

          # --- 7. Slim down .dist-info/ metadata folders -----------------
          find . -type d -name "*.dist-info" -print0 | while IFS= read -r -d '' d; do
            rm -f \
              "$d/RECORD" \
              "$d/INSTALLER" \
              "$d/REQUESTED" \
              "$d/WHEEL" \
              "$d/AUTHORS" \
              "$d/LICENSE"* \
              "$d/NOTICE"*
          done

          echo "--- trimmed extlibs size ---"
          du -sh .
          du -sh */ 2>/dev/null | sort -h | tail -n 20 || true

      - name: Strip debug symbols from native modules (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -eu
          cd extlibs
          if [ "${{ runner.os }}" = "macOS" ]; then
            find . -type f \( -name "*.so" -o -name "*.dylib" \) -print0 \
              | xargs -0 -r -n 50 strip -x 2>/dev/null || true
          else
            find . -type f -name "*.so*" -print0 \
              | xargs -0 -r -n 50 strip --strip-unneeded 2>/dev/null || true
          fi
          echo "--- stripped extlibs size ---"
          du -sh .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extlibs_${{ matrix.archive_os }}_py${{ matrix.python-version }}
          path: extlibs
          compression-level: 9
          retention-days: 30
          if-no-files-found: error
